spring:
  application:
    name: mvp

  datasource:
    url: jdbc:postgresql://localhost:5432/shiftpay
    username: shiftpay
    password: shiftpay
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    user: shiftpay
    password: shiftpay

  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC