spring:
  application:
    name: mvp
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:shiftpay}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:shiftpay}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:shiftpay}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
