
services:
  postgres:
    image: postgres:17
    container_name: shiftpay-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: shiftpay
      POSTGRES_USER: shiftpay
      POSTGRES_PASSWORD: shiftpay

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: